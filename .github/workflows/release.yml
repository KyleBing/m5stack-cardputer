# 推送 v* tag 时自动编译固件 + LittleFS，合并全镜像并发布 GitHub Release
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '已存在的 tag（留空则用当前 ref）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install -U platformio esptool

      - name: Build firmware
        run: pio run -e m5stack-cardputer

      - name: Build LittleFS
        run: pio run -e m5stack-cardputer -t buildfs

      - name: Package artifacts
        id: pkg
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          BUILD=".pio/build/m5stack-cardputer"
          OUT="dist"
          mkdir -p "$OUT"

          cp "$BUILD/firmware.bin" "$OUT/sparks-${TAG}-firmware.bin"
          cp "$BUILD/littlefs.bin" "$OUT/sparks-${TAG}-littlefs.bin"

          # 合并 bootloader + 分区表 + app + LittleFS（StampS3 8MB / default_8MB）
          esptool.py --chip esp32s3 merge_bin \
            -o "$OUT/sparks-${TAG}-merged.bin" \
            --flash_mode qio \
            --flash_freq 80m \
            --flash_size 8MB \
            0x0 "$BUILD/bootloader.bin" \
            0x8000 "$BUILD/partitions.bin" \
            0x10000 "$BUILD/firmware.bin" \
            0x670000 "$BUILD/littlefs.bin"

          ls -lh "$OUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: Sparks ${{ steps.pkg.outputs.tag }}
          generate_release_notes: true
          body: |
            ## 刷机说明

            ### 下载固件

            | 文件 | 用途 |
            |------|------|
            | `sparks-${{ steps.pkg.outputs.tag }}-merged.bin` | 整片烧录（推荐首次刷机 / M5Burner），地址 `0x0` |
            | `sparks-${{ steps.pkg.outputs.tag }}-firmware.bin` | 仅更新程序，地址 `0x10000` |
            | `sparks-${{ steps.pkg.outputs.tag }}-littlefs.bin` | 仅更新资源（图标等），地址 `0x670000` |

            ### 刷写工具

            安装 **esptool**：

            ```bash
            pip install -U esptool
            ```

            也可使用 [M5Burner](https://docs.m5stack.com/en/download) 图形界面烧录 `*-merged.bin`（地址填 `0x0`）。

            ### 连接设备

            USB 连接 Cardputer-ADV，确认串口后替换下方命令中的 `PORT`：

            - Windows：`COM3` 等（设备管理器查看）
            - macOS：`/dev/cu.usbmodem*`
            - Linux：`/dev/ttyACM0` 或 `/dev/ttyUSB0`

            ### 刷写指令

            **首次刷机 / 完全重置**（整片烧录，会格式化存储区）：

            ```bash
            esptool.py --chip esp32s3 --port PORT --baud 921600 write_flash \
              --flash_mode qio --flash_freq 80m --flash_size 8MB \
              0x0 sparks-${{ steps.pkg.outputs.tag }}-merged.bin
            ```

            **常规升级**（保留 WiFi、配置等用户数据，仅更新程序）：

            ```bash
            esptool.py --chip esp32s3 --port PORT --baud 921600 write_flash \
              --flash_mode qio --flash_freq 80m --flash_size 8MB \
              0x10000 sparks-${{ steps.pkg.outputs.tag }}-firmware.bin
            ```

            **仅更新资源**（LittleFS，一般无需单独操作）：

            ```bash
            esptool.py --chip esp32s3 --port PORT --baud 921600 write_flash \
              --flash_mode qio --flash_freq 80m --flash_size 8MB \
              0x670000 sparks-${{ steps.pkg.outputs.tag }}-littlefs.bin
            ```

            ### PlatformIO 本地编译

            ```bash
            pio run -e m5stack-cardputer -t upload      # 上传固件
            pio run -e m5stack-cardputer -t uploadfs    # 上传 LittleFS
            ```

            ### 常见问题

            - 如未识别设备，请确认已安装 USB 驱动（详见设备说明书）。
            - 刷写失败或设备启动异常，可按住设备按键复位后重试。
            - 建议升级前备份重要配置；完全重置请使用 `*-merged.bin`。
          files: |
            dist/sparks-${{ steps.pkg.outputs.tag }}-merged.bin
            dist/sparks-${{ steps.pkg.outputs.tag }}-firmware.bin
            dist/sparks-${{ steps.pkg.outputs.tag }}-littlefs.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
