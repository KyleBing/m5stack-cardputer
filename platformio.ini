; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Cardputer
    m5stack/M5Unified
    bblanchon/ArduinoJson@^7.2.0
    crankyoldgit/IRremoteESP8266@^2.8.6
board_build.filesystem = littlefs
; StampS3 默认 MODE=1（JTAG 烧录）。HID 键盘需要 TinyUSB（MODE=0），
; 但不开 CDC_ON_BOOT：开机不抢 PHY，仍走 USB-Serial/JTAG 烧录；
; 仅在 HID 应用进入 USB 模式时再切换到 OTG，退出时切回 JTAG。
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -D_IR_ENABLE_DEFAULT_=false
    -DSEND_NEC=true
    -DSEND_SAMSUNG=true
    -DSEND_SONY=true
    -DSEND_LG=true
    -DSEND_PANASONIC=true
    -DSEND_MIDEA=true
    -DSEND_GREE=true
    -DSEND_HAIER_AC176=true
    -DSEND_ELECTRA_AC=true
    -DSEND_KELON=true
    -DSEND_COOLIX=true
    -DSEND_COOLIX48=true
